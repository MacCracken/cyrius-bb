name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Toolchain pin read from cyrius.cyml (single source of truth).
        # Version-pinned install layout (~/.cyrius/versions/$V/{bin,lib}/)
        # — the cyrius CLI's stdlib resolver prefers this path. Pre-flight
        # HTTP check surfaces a clear error if the cyml pin is ahead of the
        # published cyrius release. Mirrors cyrius-doom / vani / yukti CI.
        run: |
          set -e
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          TARBALL="cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          URL="https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/$TARBALL"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" -I "$URL")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::error::Cyrius release $CYRIUS_VERSION not found on GitHub (HTTP $HTTP_CODE)."
            echo "::error::cyrius.cyml's 'cyrius =' pin was bumped ahead of the published release."
            exit 1
          fi
          curl -sLO "$URL"
          tar xzf "$TARBALL"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"* 2>/dev/null || true
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/bin"
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Lock file present
        # cyrius.lock is the supply-chain integrity anchor for the
        # [deps.mabda] / [deps.sankoch] / [deps.sigil] git deps. Must be
        # committed; --verify against a freshly-created lock is meaningless.
        run: |
          test -f cyrius.lock || {
            echo "::error::cyrius.lock missing — supply-chain integrity requires this committed"
            exit 1
          }

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # cyrius 6.0.1 has a known regression where `cyrius deps` writes an
        # empty cyrius.lock for some manifest shapes (incl. ours). Only run
        # --verify when the committed lock actually has entries, so a
        # populated lock still enforces integrity but an empty one doesn't
        # trivially-pass. Drop this guard once the upstream fix lands.
        run: |
          if [ -s cyrius.lock ] && [ "$(wc -l < cyrius.lock)" -gt 0 ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock is empty (cyrius 6.0.1 lockfile-writer regression) — verify skipped"
          fi

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/cyrius-bb
          echo "cyrius-bb: $(wc -c < build/cyrius-bb) bytes"

      - name: Lint
        run: |
          for f in src/*.cyr; do cyrius lint "$f"; done

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: cyrius-bb-x86_64
          path: build/cyrius-bb
          retention-days: 5

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          TARBALL="cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          URL="https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/$TARBALL"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" -I "$URL")
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "302" ]; then
            echo "::error::Cyrius release $CYRIUS_VERSION not found on GitHub (HTTP $HTTP_CODE)."
            exit 1
          fi
          curl -sLO "$URL"
          tar xzf "$TARBALL"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin/"* 2>/dev/null || true
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/bin" "$HOME/.cyrius/bin"
          ln -sfn "$HOME/.cyrius/versions/$CYRIUS_VERSION/lib" "$HOME/.cyrius/lib"
          echo "$CYRIUS_VERSION" > "$HOME/.cyrius/current"
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Run tests
        run: |
          cyrius test tests/cyrius-bb.tcyr 2>&1 | tee /tmp/test_output
          tail -1 /tmp/test_output | grep ', 0 failed'

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          for doc in README.md CHANGELOG.md VERSION LICENSE CLAUDE.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md cyrius.cyml; do
            test -f "$doc" && echo "OK: $doc" || { echo "MISSING: $doc"; exit 1; }
          done

      - name: Verify version consistency
        # VERSION is the single source of truth. cyrius.cyml uses the
        # ${file:VERSION} template — resolve it for the check. Same shape
        # as cyrius-doom / vani CI.
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
              CYML_VERSION="$FILE_VERSION"
          else
              CYML_VERSION="$CYML_RAW"
          fi
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_RAW)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION (cyml: $CYML_RAW)"
